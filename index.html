<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT-SYNTH v1.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="workspace">
        <div class="main-layout">
            <div class="visualizer-section">
                <div class="visualizer-wrapper">
                    <canvas id="visualizer"></canvas>
                </div>
            </div>
            <div class="right-section">
                <div class="text-area-wrapper">
                    <textarea id="text-input" placeholder="INIT_SEQUENCE_READY..." spellcheck="false"></textarea>
                </div>
                <div class="panel-row">
                    <div class="control-group">
                        <label for="pitch">PITCH</label>
                        <input type="range" id="pitch" min="0.5" max="2.0" step="0.1" value="1.0">
                    </div>
                    <div class="control-group">
                        <label for="decay">DECAY</label>
                        <input type="range" id="decay" min="0.1" max="1.0" step="0.1" value="0.3">
                    </div>
                    <div class="control-group">
                        <label for="thickness">THICKNESS</label>
                        <input type="range" id="thickness" min="0.5" max="10.0" step="0.5" value="2.0">
                    </div>
                    <button id="transmit-btn" class="hardware-btn">
                        <span>TRANSMIT</span>
                    </button>
                    <div class="status-light">
                        <div class="led"></div>
                        <span>SIGNAL</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
